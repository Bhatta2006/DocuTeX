<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to DOCX Compiler</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <a href="https://github.com/Bhatta2006/DocuTeX" class="github-link" id="github-link" target="_blank" aria-label="DocuTeX GitHub Repository">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="github-icon">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
    </a>

    <div class="compiler-box">
        <h1 class="title">LaTeX to DOCX Compiler</h1>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-file">Upload File</button>
            <button class="tab-btn" id="tab-code">Paste Code</button>
        </div>

        <div class="upload-area" id="drop-zone">
            <input type="file" id="file-input" accept=".tex" hidden>
            <span id="upload-prompt">Select .tex file</span>
        </div>

        <div class="code-area-container" id="code-area-container" hidden>
            <textarea id="latex-code" placeholder="PASTE YOUR LATEX CODE HERE..."></textarea>
        </div>

        <button class="btn" id="compile-btn" disabled>Compile</button>
        
        <div id="status-container" class="status-msg" hidden></div>
        
        <div class="log-container" id="log-section" hidden>
            <div class="terminal" id="terminal-logs"></div>
        </div>
        
        <a href="#" class="btn btn-download" id="download-btn" hidden>Download .docx</a>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="/static/app.js"></script>
</body>
</html>
